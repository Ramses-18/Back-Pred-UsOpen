spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  sql:
    init:
      mode: never

server:
  port: ${PORT:10000}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  deadline-offset-minutes: 30

logging:
  level:
    org.springframework.security: DEBUG
    com.wimbledon: DEBUG

cors:
  allowed-origins: ${CORS_ORIGINS:https://front-wimbledon-2dgb.vercel.app}