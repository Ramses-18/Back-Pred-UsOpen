spring:
  datasource:
    # Reemplazamos el localhost por una variable de entorno que nos dará Render
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/wimbledon?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:18042004}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: never # Cambiado a 'never' para evitar que falle por scripts SQL antiguos

server:
  port: ${PORT:8081}

app:
  jwt:
    secret: ${JWT_SECRET:cambiar-este-secreto-en-produccion-minimo-256-bits-requerido-1234567890}
    expiration-ms: 86400000

  deadline-offset-minutes: 30

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
